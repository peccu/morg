[build]
  command = "bun run build:all"
  publish = "apps/web/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# version.json is polled by the app for fast update detection — must not be cached.
[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[dev]
  command = "bun run dev:web"
  framework = "#custom"
  targetPort = 5173
  port = 8888
  autoLaunch = false
